<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Messenger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <div id="login-screen" class="screen">
        <div class="login-container">
            <div class="logo">💬</div>
            <h1>Messenger</h1>
            <input type="text" id="login-username" placeholder="Юзернейм" autocomplete="off">
            <input type="password" id="login-password" placeholder="Пароль">
            <button id="login-btn">Войти</button>
            <button id="register-btn" class="secondary">Регистрация</button>
        </div>
    </div>

    <div id="chat-screen" class="screen" style="display: none;">
        <div class="chat-container">
            <div class="sidebar">
                <div class="user-info">
                    <div class="avatar">👤</div>
                    <span id="current-username"></span>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Поиск пользователей...">
                </div>
                <div class="users-list" id="users-list"></div>
            </div>
            <div class="chat-area">
                <div class="chat-header" id="chat-header">
                    <span>Выберите чат</span>
                </div>
                <div class="messages" id="messages"></div>
                <div class="input-area" id="input-area" style="display: none;">
                    <div class="typing-indicator" id="typing-indicator"></div>
                    <div class="message-input">
                        <label for="photo-upload" class="photo-btn">📷</label>
                        <input type="file" id="photo-upload" accept="image/*" style="display: none;">
                        <input type="text" id="message-input" placeholder="Сообщение...">
                        <button id="send-btn">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
